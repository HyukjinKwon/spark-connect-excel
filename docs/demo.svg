<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" width="1180" height="660" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <!-- SPDX-License-Identifier: Apache-2.0 -->
  <!--
    Concept animation (mockup) of the Spark Connect for Excel flow:
    type Spark SQL in the task pane -> Run -> rows land in the grid -> chart.
    This is a synthesized mockup, not a screen recording. CSS-animated; if a
    renderer strips animation, the static frame shows the finished end-state.
  -->
  <style>
    .anim { animation-duration: 12s; animation-iteration-count: infinite; animation-timing-function: ease; }
    @keyframes sql1 { 0%,4%{opacity:0} 8%,92%{opacity:1} 97%,100%{opacity:0} }
    @keyframes sql2 { 0%,8%{opacity:0} 12%,92%{opacity:1} 97%,100%{opacity:0} }
    @keyframes sql3 { 0%,12%{opacity:0} 16%,92%{opacity:1} 97%,100%{opacity:0} }
    @keyframes sql4 { 0%,16%{opacity:0} 20%,92%{opacity:1} 97%,100%{opacity:0} }
    @keyframes runGlow { 0%,26%{opacity:0} 29%,35%{opacity:1} 40%,100%{opacity:0} }
    @keyframes running { 0%,30%{opacity:0} 33%,41%{opacity:1} 44%,100%{opacity:0} }
    @keyframes spin { 0%,30%{transform:rotate(0deg)} 44%{transform:rotate(720deg)} 100%{transform:rotate(720deg)} }
    @keyframes done { 0%,44%{opacity:0} 47%,92%{opacity:1} 97%,100%{opacity:0} }
    @keyframes rows { 0%,42%{opacity:0; transform:translateY(6px)} 50%,92%{opacity:1; transform:translateY(0)} 97%,100%{opacity:0} }
    @keyframes chartIn { 0%,56%{opacity:0; transform:scale(.96)} 64%,92%{opacity:1; transform:scale(1)} 97%,100%{opacity:0} }
    @keyframes barGrow { 0%,58%{transform:scaleY(0)} 66%,100%{transform:scaleY(1)} }
    #sql1{animation-name:sql1}#sql2{animation-name:sql2}#sql3{animation-name:sql3}#sql4{animation-name:sql4}
    #runGlow{animation-name:runGlow}#running{animation-name:running}
    #spinner{animation-name:spin;transform-origin:center;transform-box:fill-box}
    #done{animation-name:done}#results{animation-name:rows}#chart{animation-name:chartIn;transform-origin:center;transform-box:fill-box}
    .bar{animation:barGrow 12s infinite ease;transform-origin:bottom;transform-box:fill-box}
    text{fill:#1f2328}
  </style>

  <rect width="1180" height="660" fill="#f0f2f4"/>

  <!-- ============================ Excel window ============================ -->
  <g>
    <rect x="24" y="24" width="1132" height="612" rx="10" fill="#ffffff" stroke="#d8dde2"/>
    <!-- title bar -->
    <rect x="24" y="24" width="1132" height="40" rx="10" fill="#217346"/>
    <rect x="24" y="44" width="1132" height="20" fill="#217346"/>
    <circle cx="48" cy="44" r="6" fill="#ff5f57"/><circle cx="68" cy="44" r="6" fill="#febc2e"/><circle cx="88" cy="44" r="6" fill="#28c840"/>
    <text x="590" y="49" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">sales.xlsx — Excel</text>

    <!-- ribbon -->
    <rect x="24" y="64" width="1132" height="56" fill="#f6f8fa"/>
    <text x="48" y="92" font-size="13" fill="#57606a">File</text>
    <text x="92" y="92" font-size="13" fill="#1f2328" font-weight="600">Home</text>
    <text x="150" y="92" font-size="13" fill="#57606a">Insert</text>
    <text x="210" y="92" font-size="13" fill="#57606a">Data</text>
    <line x1="260" y1="74" x2="260" y2="110" stroke="#e1e4e8"/>
    <!-- Spark SQL ribbon button -->
    <g>
      <rect id="runGlow" class="anim" x="276" y="72" width="118" height="40" rx="6" fill="#ffe8da"/>
      <rect x="276" y="72" width="118" height="40" rx="6" fill="none" stroke="#E25A1C" stroke-opacity="0.5"/>
      <path d="M300 80 l-10 16 h8 l-3 12 14 -18 h-8 l5 -10 z" fill="#E25A1C"/>
      <text x="318" y="97" font-size="13" font-weight="600" fill="#E25A1C">Spark SQL</text>
    </g>
    <text x="285" y="108" font-size="9" fill="#8b949e"></text>

    <!-- column headers -->
    <g font-size="12" fill="#57606a">
      <rect x="24" y="120" width="772" height="24" fill="#f6f8fa"/>
      <rect x="24" y="120" width="40" height="24" fill="#eef1f3"/>
      <text x="120" y="137" text-anchor="middle">A — category</text>
      <text x="320" y="137" text-anchor="middle">B — total</text>
      <text x="500" y="137" text-anchor="middle">C</text>
      <text x="640" y="137" text-anchor="middle">D</text>
    </g>
    <!-- grid lines -->
    <g stroke="#eaedf0">
      <line x1="64" y1="144" x2="64" y2="612"/><line x1="240" y1="144" x2="240" y2="612"/>
      <line x1="420" y1="144" x2="420" y2="612"/><line x1="580" y1="144" x2="580" y2="612"/>
      <line x1="700" y1="144" x2="700" y2="612"/>
      <line x1="24" y1="168" x2="796" y2="168"/><line x1="24" y1="200" x2="796" y2="200"/>
      <line x1="24" y1="232" x2="796" y2="232"/><line x1="24" y1="264" x2="796" y2="264"/>
      <line x1="24" y1="296" x2="796" y2="296"/>
    </g>
    <g font-size="11" fill="#8b949e">
      <text x="44" y="161" text-anchor="middle">1</text><text x="44" y="193" text-anchor="middle">2</text>
      <text x="44" y="225" text-anchor="middle">3</text><text x="44" y="257" text-anchor="middle">4</text>
      <text x="44" y="289" text-anchor="middle">5</text>
    </g>

    <!-- results that land in the grid -->
    <g id="results" class="anim" font-size="13">
      <text x="80" y="161" font-weight="600" fill="#1f2328">category</text><text x="260" y="161" font-weight="600" fill="#1f2328">total</text>
      <text x="80" y="193">Electronics</text><text x="260" y="193">48,210</text>
      <text x="80" y="225">Apparel</text><text x="260" y="225">31,540</text>
      <text x="80" y="257">Home</text><text x="260" y="257">27,330</text>
      <text x="80" y="289">Sports</text><text x="260" y="289">19,870</text>
    </g>

    <!-- native Excel chart that appears on the sheet -->
    <g id="chart" class="anim">
      <rect x="430" y="330" width="346" height="250" rx="6" fill="#ffffff" stroke="#d8dde2"/>
      <text x="603" y="356" text-anchor="middle" font-size="13" font-weight="600">Total by category</text>
      <line x1="460" y1="552" x2="752" y2="552" stroke="#c4cad0"/>
      <g>
        <rect class="bar" x="478" y="392" width="44" height="160" fill="#E25A1C"/>
        <rect class="bar" x="546" y="440" width="44" height="112" fill="#f08a5d"/>
        <rect class="bar" x="614" y="456" width="44" height="96" fill="#E25A1C"/>
        <rect class="bar" x="682" y="486" width="44" height="66" fill="#f08a5d"/>
      </g>
      <g font-size="10" fill="#8b949e" text-anchor="middle">
        <text x="500" y="568">Elec</text><text x="568" y="568">Appa</text><text x="636" y="568">Home</text><text x="704" y="568">Spor</text>
      </g>
    </g>
  </g>

  <!-- ============================ Task pane ============================== -->
  <g>
    <rect x="812" y="120" width="344" height="516" fill="#fbfcfd" stroke="#e1e4e8"/>
    <rect x="812" y="120" width="344" height="48" fill="#ffffff" stroke="#e1e4e8"/>
    <path d="M838 134 l-9 15 h7 l-3 11 13 -17 h-7 l5 -9 z" fill="#E25A1C"/>
    <text x="856" y="150" font-size="15" font-weight="700" fill="#E25A1C">Spark Connect</text>

    <!-- connection status -->
    <rect x="828" y="184" width="312" height="34" rx="6" fill="#eaf7ee" stroke="#bfe6cb"/>
    <circle cx="846" cy="201" r="5" fill="#1a7f37"/>
    <text x="860" y="206" font-size="12" fill="#1a7f37">Connected · sc://localhost:8081</text>

    <!-- SQL editor -->
    <text x="828" y="244" font-size="12" font-weight="600" fill="#57606a">SQL</text>
    <rect x="828" y="252" width="312" height="120" rx="6" fill="#0d1117"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5">
      <text id="sql1" class="anim" x="842" y="276" fill="#ff9e64"><tspan fill="#7ee787">SELECT</tspan> category,</text>
      <text id="sql2" class="anim" x="842" y="298" fill="#e6edf3">       <tspan fill="#7ee787">SUM</tspan>(amount) <tspan fill="#7ee787">AS</tspan> total</text>
      <text id="sql3" class="anim" x="842" y="320" fill="#e6edf3"><tspan fill="#7ee787">FROM</tspan>   sales</text>
      <text id="sql4" class="anim" x="842" y="342" fill="#e6edf3"><tspan fill="#7ee787">GROUP BY</tspan> category</text>
    </g>

    <!-- row cap + Run -->
    <text x="828" y="398" font-size="11" fill="#8b949e">Max rows: 10,000</text>
    <rect x="828" y="408" width="312" height="40" rx="6" fill="#E25A1C"/>
    <text x="984" y="433" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">▶  Run query</text>

    <!-- running state -->
    <g id="running" class="anim">
      <g id="spinner">
        <circle cx="844" cy="476" r="8" fill="none" stroke="#E25A1C" stroke-width="2.5" stroke-dasharray="34 16" stroke-linecap="round"/>
      </g>
      <text x="862" y="481" font-size="12" fill="#57606a">Running on Spark…</text>
    </g>
    <!-- done state -->
    <g id="done" class="anim">
      <circle cx="844" cy="476" r="8" fill="#1a7f37"/>
      <path d="M840 476 l3 3 5 -6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="862" y="481" font-size="12" fill="#1a7f37">4 rows · written to A1 · chart inserted</text>
    </g>

    <text x="828" y="612" font-size="10.5" fill="#8b949e">Runs in your browser via pyspark-connect-web —</text>
    <text x="828" y="626" font-size="10.5" fill="#8b949e">no backend server.</text>
  </g>
</svg>
