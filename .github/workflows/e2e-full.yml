# SPDX-License-Identifier: Apache-2.0
name: e2e-full

# The COMPLETE browser-to-Spark end-to-end gate: vendors Pyodide + the wheels,
# brings up the real Spark Connect + Envoy + static stack via docker compose,
# and drives the web demo in headless Chromium through a live Spark SQL query.
# Heavier and slower than ci.yml / e2e.yml; separate workflow.
#
# STATUS (investigative gate, run on demand): every layer is green - it vendors
# Pyodide 314.0.0 + the pyspark-client/pcw wheels, brings up Spark Connect +
# Envoy + the static host, and the in-browser Pyodide engine boots and installs
# all wheels. OPEN item: the in-browser connect's blocking grpc-web call to
# Envoy (:8081) does not return (the demo stays on "Starting engine and
# connecting...", no browser error, even after 11 min) - the grpc-web <-> Spark
# Connect path needs trace-level debugging (Playwright trace + Envoy /clusters +
# Spark logs). Until then this runs via workflow_dispatch only so it does not
# gate pushes. ci.yml (incl. the real-Spark Python integration test) and e2e.yml
# (the COI browser gate) are the always-on gates and are green.

on:
  workflow_dispatch:

concurrency:
  group: e2e-full-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  full:
    name: full browser e2e (Pyodide + grpc-web + Spark)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      E2E_FULL: "1"
      E2E_DEMO_URL: http://localhost:8000/demo/demo.html
      PYODIDE_VERSION: "314.0.0"
      PYSPARK_CLIENT_VERSION: "4.1.2"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Vendor pcw glue + wheels from ONE pcw checkout (self-consistent)
        run: |
          set -euxo pipefail
          # pcw moves fast (release vs main diverge on version + Spark target), so
          # take the glue AND the pcw wheel from the SAME checkout - their versions
          # then match by construction. Build whichever spark/pyspark-client wheel
          # that checkout's bootstrap requests (parsed from worker_bootstrap.js).
          git clone --depth 1 https://github.com/HyukjinKwon/pyspark-client-wasm /tmp/pcw
          cp /tmp/pcw/pyspark_connect_web/worker/worker_bootstrap.js \
             /tmp/pcw/pyspark_connect_web/worker/bridge.js \
             /tmp/pcw/pyspark_connect_web/jupyterlite/coi-serviceworker.js public/vendor/
          boot=public/vendor/worker_bootstrap.js
          # pcw wheel (built from the same checkout -> version matches the glue)
          pip wheel /tmp/pcw --no-deps -w public/
          # whichever Spark client wheel the bootstrap asks for, at the exact name
          want="$(grep -oE '/pyspark[A-Za-z0-9._-]*\.whl' "$boot" | head -1 | sed 's#^/##')"
          echo "bootstrap wants spark wheel: $want"
          if echo "$want" | grep -q '^pyspark_client-'; then
            sver="$(echo "$want" | sed -E 's/pyspark_client-([0-9.]+)-.*/\1/')"
            pip wheel "pyspark-client==${sver}" --no-deps -w public/
            got="$(ls public/pyspark_client-*.whl | head -1)"
          else
            sver="$(echo "$want" | sed -E 's/pyspark-([0-9.]+)-.*/\1/')"
            pip wheel "pyspark==${sver}" --no-deps -w public/
            got="$(ls public/pyspark-*.whl | head -1)"
          fi
          [ "$got" = "public/${want}" ] || mv "$got" "public/${want}"
          rm -f public/*.tar.gz
          ls public/*.whl

      - name: Vendor Pyodide (same-origin)
        run: |
          set -euxo pipefail
          curl -fsSL "https://github.com/pyodide/pyodide/releases/download/${PYODIDE_VERSION}/pyodide-${PYODIDE_VERSION}.tar.bz2" -o /tmp/pyodide.tar.bz2
          mkdir -p public/pyodide
          tar xjf /tmp/pyodide.tar.bz2 -C /tmp
          cp -r /tmp/pyodide/* public/pyodide/
          test -f public/pyodide/pyodide.mjs

      - name: Build dist (with vendored assets)
        run: npm run build

      - name: Bring up Spark + Envoy + static stack
        run: docker compose -f deploy/compose.yaml up -d --wait

      - name: Stack health
        run: |
          set -uxo pipefail
          curl -sS -I http://localhost:8000/demo/demo.html | head -20
          curl -sS -o /dev/null -w "envoy-ready:%{http_code}\n" http://localhost:9901/ready || true

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run full-stack e2e
        run: npx playwright test --config tests/e2e/playwright.full.config.ts

      - name: Upload Playwright report + live screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-report
          path: playwright-report

      - name: Stack logs (debug)
        if: always()
        run: docker compose -f deploy/compose.yaml logs --no-color | tail -400

      - name: Tear down
        if: always()
        run: docker compose -f deploy/compose.yaml down -v
