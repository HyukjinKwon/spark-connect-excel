# SPDX-License-Identifier: Apache-2.0
name: e2e-full

# The COMPLETE browser-to-Spark end-to-end gate: vendors Pyodide + the wheels,
# brings up the real Spark Connect + Envoy + static stack via docker compose,
# and drives the web demo in headless Chromium through a live Spark SQL query.
# Heavier and slower than ci.yml / e2e.yml; separate workflow.
#
# STATUS: GREEN and gating. It vendors Pyodide 314.0.0 + the pyspark-client/pcw
# wheels, brings up Spark Connect + Envoy + the static host, boots the in-browser
# Pyodide engine, connects through grpc-web, runs a real Spark SQL query, and
# asserts the rendered result table AND chart - then uploads a live screenshot
# (web-demo-live.png). This is the complete browser-to-Spark proof.
#
# Runs on pushes to main and on PRs (and on demand). Heavier/slower than ci.yml
# and e2e.yml, but it is the definitive end-to-end gate.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-full-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  full:
    name: full browser e2e (Pyodide + grpc-web + Spark)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      E2E_FULL: "1"
      E2E_DEMO_URL: http://localhost:8000/demo/demo.html
      PYODIDE_VERSION: "314.0.0"
      PYSPARK_CLIENT_VERSION: "4.1.2"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Vendor runtime assets (the same script users run)
        # Exercises scripts/vendor-runtime.mjs end to end so this gate proves the
        # quickstart vendoring path: glue + pcw wheel + the named Spark client
        # wheel (all from ONE pcw checkout) + Pyodide, all same-origin.
        run: npm run vendor:runtime
        env:
          PCW_REF: main
          PYODIDE_VERSION: "314.0.0"

      - name: Verify vendored assets
        run: |
          set -euxo pipefail
          test -f public/pyodide/pyodide.mjs
          ls public/*.whl

      - name: Build dist (with vendored assets)
        run: npm run build

      - name: Bring up Spark + Envoy + static stack
        run: docker compose -f deploy/compose.yaml up -d --wait

      - name: Stack health
        run: |
          set -uxo pipefail
          curl -sS -I http://localhost:8000/demo/demo.html | head -20
          curl -sS -o /dev/null -w "envoy-ready:%{http_code}\n" http://localhost:9901/ready || true

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run full-stack e2e
        run: npx playwright test --config tests/e2e/playwright.full.config.ts

      - name: Upload Playwright report + live screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-report
          path: playwright-report

      - name: Stack logs (debug)
        if: always()
        run: docker compose -f deploy/compose.yaml logs --no-color | tail -400

      - name: Tear down
        if: always()
        run: docker compose -f deploy/compose.yaml down -v
