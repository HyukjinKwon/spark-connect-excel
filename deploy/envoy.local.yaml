# SPDX-License-Identifier: Apache-2.0
#
# Standalone Envoy config for running WITHOUT Docker, in front of a Spark
# Connect server you started yourself on 127.0.0.1:15002 (e.g. via
# `pip install "pyspark[connect]"` + start-connect-server.sh).
#
# It exposes ONE listener: the grpc-web endpoint on :8081, forwarding to your
# local Spark Connect gRPC server on :15002. No static host here - serve the
# add-in / demo with `npm run dev:https` (https://localhost:3000), which the
# CORS allowlist below permits.
#
#   Browser client URL: sc://localhost:8081/;transport=grpcweb
#   Demo:               https://localhost:3000/demo/demo.html  (Host=localhost, Port=8081)
#
# Run it (macOS, no Docker):
#   brew install envoy
#   envoy -c deploy/envoy.local.yaml
#
# Leave it running alongside your Spark Connect server and `npm run dev:https`.

admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 9901 }

static_resources:
  listeners:
    - name: grpcweb_listener
      address:
        socket_address: { address: 0.0.0.0, port_value: 8081 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: grpcweb
                codec_type: AUTO
                # Spark Connect ExecutePlan/ReattachExecute are long-lived server
                # streams; disable idle timeout so Envoy does not cut them.
                stream_idle_timeout: 0s
                route_config:
                  name: grpcweb_route
                  virtual_hosts:
                    - name: grpcweb_host
                      domains: ["*"]
                      cors:
                        allow_origin_string_match:
                          - safe_regex:
                              regex: "^https?://localhost:(3000|8000)$"
                        allow_methods: "GET, POST, OPTIONS"
                        # Reflect ALL requested headers (the grpc-web client sends
                        # grpc-accept-encoding, transport, ...). Safe here: this is
                        # a localhost-only dev proxy and the fetch is non-credentialed.
                        allow_headers: "*"
                        expose_headers: "grpc-status,grpc-message,x-spark-connect-session-id"
                        max_age: "1728000"
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: spark-connect
                            timeout: 0s
                            max_stream_duration:
                              grpc_timeout_header_max: 0s
                http_filters:
                  - name: envoy.filters.http.grpc_web
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # Your local Spark Connect gRPC server (HTTP/2 h2c, no TLS).
    - name: spark-connect
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: spark-connect
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 15002
