#
# PRODUCTION Envoy config for spark-connect-excel (Lane I).
#
# Adapted from pyspark-connect-web's deploy/envoy.prod.yaml.
# This is the HARDENED config. The dev config (deploy/envoy.yaml) is permissive
# on purpose (localhost-only CORS, plaintext, no auth) for laptop bring-up.
# THIS file is what you deploy anywhere reachable from a network you do not
# fully control.
#
# Key differences from dev (deploy/envoy.yaml):
#   1. TLS termination on both listeners (downstream HTTPS). Browsers require a
#      secure context for crossOriginIsolated + SharedArrayBuffer on non-localhost
#      origins, so prod MUST be HTTPS.
#   2. TIGHTENED CORS: exact-string origin allowlist (no wildcard or regex).
#      The allowed origins are:
#        - https://YOUR-ADDIN-ORIGIN.example.com  (the static host serving dist/)
#      Replace this placeholder (or template it via envsubst — see
#      scripts/render_envoy_prod.sh). A localhost dev origin is intentionally
#      NOT in the prod allowlist.
#   3. Bearer-token gate (Lua): rejects any non-OPTIONS request that lacks an
#      `Authorization: Bearer <token>` header (401). The token is NOT validated
#      here — replace with jwt_authn or ext_authz for real validation (sketched
#      at the bottom of this file). The `authorization` header IS forwarded
#      upstream to Spark Connect (DECISIONS #6 enforcement point).
#   4. Request size limits aligned with large Arrow results (32 MiB per-
#      connection buffer). Server-streaming responses are not bounded here.
#   5. Health (/healthz) and readiness (/ready) endpoints on a dedicated probe
#      listener (:8089) that does NOT hit Spark — cheap for LB / k8s probes.
#   6. Admin bound to 127.0.0.1 only. Never expose :9901 publicly.
#
# COEP on the static host is `credentialless` (DECISIONS #2) — same as dev.
# This is intentional; see deploy/README.md for the rationale.
#
# Placeholder substitution variables (use scripts/render_envoy_prod.sh):
#   YOUR-PUBLIC-HOST.example.com   -> the public hostname of the Envoy proxy
#   YOUR-ADDIN-ORIGIN.example.com  -> the add-in static host origin (scheme + host)

admin:
  address:
    # Bind admin to loopback. Never expose :9901 to the public network.
    socket_address: { address: 127.0.0.1, port_value: 9901 }

static_resources:
  listeners:
    # -------------------------------------------------------------------------
    # grpc-web endpoint  (Excel add-in dialog -> Spark Connect) — TLS + auth
    # -------------------------------------------------------------------------
    - name: grpcweb_listener
      address:
        socket_address: { address: 0.0.0.0, port_value: 8443 }
      per_connection_buffer_limit_bytes: 33554432   # 32 MiB
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_params:
                  tls_minimum_protocol_version: TLSv1_2
                tls_certificates:
                  # Bind-mounted from deploy/certs/ (see compose.prod.yaml).
                  - certificate_chain:
                      filename: /etc/envoy/certs/tls.crt
                    private_key:
                      filename: /etc/envoy/certs/tls.key
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: grpcweb
                codec_type: AUTO
                # Long-lived ExecutePlan/ReattachExecute streams: disable idle
                # timeout so Envoy does not cut active Spark streaming queries.
                stream_idle_timeout: 0s
                max_request_headers_kb: 96
                common_http_protocol_options:
                  idle_timeout: 300s
                route_config:
                  name: grpcweb_route
                  virtual_hosts:
                    - name: grpcweb_host
                      domains:
                        - "YOUR-PUBLIC-HOST.example.com"
                        - "YOUR-PUBLIC-HOST.example.com:8443"
                      # TIGHTENED CORS — exact-string origin allowlist.
                      # Only the add-in static host origin is allowed. No wildcard.
                      # Replace with the real origin(s) before deploying.
                      cors:
                        allow_origin_string_match:
                          - exact: "https://YOUR-ADDIN-ORIGIN.example.com"
                        allow_methods: "POST, OPTIONS"
                        allow_headers: >-
                          keep-alive,user-agent,cache-control,content-type,content-transfer-encoding,
                          x-grpc-web,x-user-agent,grpc-timeout,authorization,x-spark-connect-session-id
                        expose_headers: "grpc-status,grpc-message,x-spark-connect-session-id"
                        allow_credentials: true
                        max_age: "86400"
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: spark-connect
                            timeout: 0s
                            max_stream_duration:
                              grpc_timeout_header_max: 0s
                http_filters:
                  - name: envoy.filters.http.grpc_web
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  # ---- AUTH ENFORCEMENT (Spark Connect has no built-in auth) ----
                  # Lua gate: rejects any non-preflight request missing a Bearer
                  # token with a 401. Lets OPTIONS preflights through so CORS
                  # negotiation is not broken.
                  #
                  # IMPORTANT: This gate checks PRESENCE only — it does NOT
                  # validate the token's signature or claims. Replace with
                  # jwt_authn or ext_authz (sketched at the bottom of this file)
                  # before trusting the token to mean anything.
                  #
                  # Token forwarding: the `authorization` header passes through to
                  # the Spark Connect upstream unchanged (DECISIONS #6). A Spark-
                  # side plugin interceptor can re-read it if needed.
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          function envoy_on_request(handle)
                            local method = handle:headers():get(":method")
                            if method == "OPTIONS" then
                              return   -- let CORS preflight through unconditionally
                            end
                            local auth = handle:headers():get("authorization")
                            if auth == nil or auth:sub(1, 7) ~= "Bearer " then
                              handle:respond(
                                {[":status"] = "401",
                                 ["content-type"] = "text/plain",
                                 ["www-authenticate"] = "Bearer realm=\"spark-connect-excel\""},
                                "Missing or malformed Authorization: Bearer <token>\n")
                            end
                            -- Token present: forward upstream. Spark Connect does
                            -- not authenticate internally — validation belongs in
                            -- jwt_authn/ext_authz above if you need it.
                          end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # -------------------------------------------------------------------------
    # Add-in static host — TLS + COOP/COEP  (DECISIONS #2)
    # -------------------------------------------------------------------------
    - name: static_listener
      address:
        socket_address: { address: 0.0.0.0, port_value: 8444 }
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_params:
                  tls_minimum_protocol_version: TLSv1_2
                tls_certificates:
                  - certificate_chain:
                      filename: /etc/envoy/certs/tls.crt
                    private_key:
                      filename: /etc/envoy/certs/tls.key
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: static
                codec_type: AUTO
                route_config:
                  name: static_route
                  virtual_hosts:
                    - name: static_host
                      domains:
                        - "YOUR-PUBLIC-HOST.example.com"
                        - "YOUR-PUBLIC-HOST.example.com:8444"
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: static-site }
                          # MANDATORY cross-origin isolation headers.
                          # COOP same-origin: required for SharedArrayBuffer.
                          # COEP credentialless (DECISIONS #2): allows the dialog
                          # to load cross-origin Pyodide / PyPI wheels without
                          # those CDNs sending CORP headers. `require-corp` would
                          # block jsDelivr and PyPI CDN resources.
                          response_headers_to_add:
                            - header:
                                key: "Cross-Origin-Opener-Policy"
                                value: "same-origin"
                              append_action: OVERWRITE_IF_EXISTS_OR_ADD
                            - header:
                                key: "Cross-Origin-Embedder-Policy"
                                value: "credentialless"
                              append_action: OVERWRITE_IF_EXISTS_OR_ADD
                            - header:
                                key: "Cross-Origin-Resource-Policy"
                                value: "cross-origin"
                              append_action: OVERWRITE_IF_EXISTS_OR_ADD
                            - header:
                                key: "X-Content-Type-Options"
                                value: "nosniff"
                              append_action: OVERWRITE_IF_EXISTS_OR_ADD
                            - header:
                                key: "Strict-Transport-Security"
                                value: "max-age=31536000; includeSubDomains"
                              append_action: OVERWRITE_IF_EXISTS_OR_ADD
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # -------------------------------------------------------------------------
    # Health / readiness probe listener (:8089) — plaintext, cheap, no Spark
    #   GET /healthz -> 200 "live"   (Envoy process alive)
    #   GET /ready   -> 200/503      (health_check filter; reflects drain state)
    # Point k8s livenessProbe at /healthz and readinessProbe at /ready.
    # -------------------------------------------------------------------------
    - name: health_listener
      address:
        socket_address: { address: 0.0.0.0, port_value: 8089 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: health
                codec_type: AUTO
                route_config:
                  name: health_route
                  virtual_hosts:
                    - name: health_host
                      domains: ["*"]
                      routes:
                        - match: { path: "/healthz" }
                          direct_response:
                            status: 200
                            body: { inline_string: "live\n" }
                http_filters:
                  - name: envoy.filters.http.health_check
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.health_check.v3.HealthCheck
                      pass_through_mode: false
                      headers:
                        - name: ":path"
                          string_match: { exact: "/ready" }
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # Upstream Spark Connect gRPC server (h2c, private network — no TLS upstream).
    # In prod keep Spark on a private network; the Envoy proxy is the only public
    # surface. If your Spark deployment uses TLS add a transport_socket here too.
    - name: spark-connect
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      per_connection_buffer_limit_bytes: 33554432   # 32 MiB
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      health_checks:
        - timeout: 2s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 1
          tcp_health_check: {}
      load_assignment:
        cluster_name: spark-connect
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: spark-connect
                      port_value: 15002

    - name: static-site
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: static-site
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: static
                      port_value: 80

# ---------------------------------------------------------------------------
# REAL AUTH — replace the Lua gate above with one of these in production
# ---------------------------------------------------------------------------
# Option A — validate a JWT (e.g. from your IdP / OAuth2 token endpoint):
#
#   - name: envoy.filters.http.jwt_authn
#     typed_config:
#       "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
#       providers:
#         idp:
#           issuer: "https://your-idp.example.com/"
#           audiences: ["spark-connect-excel"]
#           remote_jwks:
#             http_uri:
#               uri: "https://your-idp.example.com/.well-known/jwks.json"
#               cluster: idp_jwks
#               timeout: 5s
#             cache_duration: 600s
#       rules:
#         - match: { prefix: "/" }
#           requires: { provider_name: idp }
#
# Option B — delegate to an external authz service (opaque tokens, ACLs):
#
#   - name: envoy.filters.http.ext_authz
#     typed_config:
#       "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
#       grpc_service:
#         envoy_grpc: { cluster_name: ext_authz }
#         timeout: 1s
#       transport_api_version: V3
#
# Both run BEFORE the router and AFTER cors, so CORS preflights still succeed.
# The `authorization` header is forwarded to Spark Connect either way.
